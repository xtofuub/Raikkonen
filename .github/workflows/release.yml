name: Publish release

on:
  push:
    branches:
      - main
    paths:
      - .release/v6.0.1

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package Firefox extension
        run: |
          zip -9 -j kimi-auto-continue-firefox-v6.0.1.zip \
            manifest.json \
            content.js \
            popup.html \
            popup.css \
            popup.js \
            icon.svg

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(cat <<'EOF'
          ## Kimi Auto Continue v6.0.1

          Small pit-stop release fixing the Firefox toolbar icon.

          ### Included
          - replaced corrupted PNG assets with a sharp SVG icon
          - automatic **Continue Task** handling
          - reliable **Got it** popup dismissal
          - background-tab monitoring
          - local controls and diagnostics
          - still absolutely no interest in pressing **Upgrade**

          Named after the other Kimi, who also preferred a quick pit stop.
          EOF
          )

          if gh release view v6.0.1 >/dev/null 2>&1; then
            gh release upload v6.0.1 kimi-auto-continue-firefox-v6.0.1.zip --clobber
          else
            gh release create v6.0.1 \
              kimi-auto-continue-firefox-v6.0.1.zip \
              --target "$GITHUB_SHA" \
              --title "Kimi Auto Continue v6.0.1" \
              --notes "$NOTES"
          fi
