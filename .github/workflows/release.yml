name: Publish release

on:
  push:
    branches:
      - main
    paths:
      - .release/v6.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package Firefox extension
        run: |
          zip -9 -j kimi-auto-continue-firefox-v6.zip \
            manifest.json \
            content.js \
            popup.html \
            popup.css \
            popup.js \
            icon-48.png \
            icon-96.png

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES=$(cat <<'EOF'
          ## Kimi Auto Continue v6.0.0

          Keeps Kimi moving through queue pauses without requiring constant tab babysitting.

          ### Included
          - automatic **Continue Task** handling
          - reliable **Got it** popup dismissal
          - background-tab monitoring
          - local controls and diagnostics
          - absolutely no interest in pressing **Upgrade**

          Named after the other Kimi, who was also quite good at continuing.
          EOF
          )

          if gh release view v6.0.0 >/dev/null 2>&1; then
            gh release upload v6.0.0 kimi-auto-continue-firefox-v6.zip --clobber
          else
            gh release create v6.0.0 \
              kimi-auto-continue-firefox-v6.zip \
              --target "$GITHUB_SHA" \
              --title "Kimi Auto Continue v6.0.0" \
              --notes "$NOTES"
          fi
